name: Congressional Trade Tracker

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml pandas

      - name: Run tracker
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PWD: ${{ secrets.GMAIL_APP_PWD }}
        run: python tracker.py

      - name: Commit known IDs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add known_ids.txt
          git diff --staged --quiet || git commit -m "Update known trade IDs"
          git push
